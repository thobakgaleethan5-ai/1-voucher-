
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Racing Game</title>

<style>
body{
margin:0;
overflow:hidden;
background:#222;
font-family:Arial,sans-serif;
}

#game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
background:#444;
}

#road{
position:absolute;
left:50%;
transform:translateX(-50%);
width:320px;
height:100%;
background:#555;
border-left:8px solid white;
border-right:8px solid white;
}

.line{
position:absolute;
left:50%;
width:10px;
height:60px;
background:white;
transform:translateX(-50%);
}

#player{
position:absolute;
width:50px;
height:90px;
background:red;
border-radius:10px;
bottom:30px;
left:135px;
}

.controls{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 40px;
box-sizing:border-box;
}

button{
width:90px;
height:90px;
font-size:30px;
border:none;
border-radius:50%;
background:#22c55e;
color:white;
}
</style>
</head>

<body>

<div id="game">
<div id="road">
<div id="player"></div>
</div>

<div class="controls">
<button id="left">⬅</button>
<button id="right">➡</button>
</div>
</div>

<script>
const player=document.getElementById("player");

let x=135;

document.getElementById("left").onclick=()=>{
x-=20;
if(x<0)x=0;
player.style.left=x+"px";
}

document.getElementById("right").onclick=()=>{
x+=20;
if(x>270)x=270;
player.style.left=x+"px";
}

document.addEventListener("keydown",(e)=>{
if(e.key==="ArrowLeft"){
x-=20;
if(x<0)x=0;
}
if(e.key==="ArrowRight"){
x+=20;
if(x>270)x=270;
}
player.style.left=x+"px";
});

for(let i=0;i<12;i++){
let line=document.createElement("div");
line.className="line";
line.style.top=(i*100)+"px";
document.getElementById("road").appendChild(line);
}
</script>

</body>
</html>
